<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>ptykit · collaborative</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.min.css" />
		<style>
			html, body { margin: 0; height: 100%; background: #0f172a; color: #e2e8f0; font-family: ui-monospace, monospace; }
			#bar { padding: 6px 10px; font-size: 12px; border-bottom: 1px solid #1e293b; }
			#split { position: absolute; top: 33px; left: 0; right: 0; bottom: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #1e293b; }
			.pane { display: flex; flex-direction: column; min-width: 0; background: #0f172a; }
			.pane-head { display: flex; justify-content: space-between; padding: 4px 8px; font-size: 11px; border-bottom: 1px solid #1e293b; }
			.status { text-transform: uppercase; opacity: 0.8; }
			.status[data-status='connected'] { color: #4ade80; }
			.status[data-status='reconnecting'] { color: #fde047; }
			.status[data-status='disconnected'] { color: #f87171; }
			.screen { flex: 1; padding: 6px; min-height: 0; }
		</style>
	</head>
	<body>
		<div id="bar"><strong>ptykit</strong> · collaborative — both panes share one session; type in either</div>
		<div id="split">
			<div class="pane">
				<div class="pane-head"><span>Client A</span><span class="status" id="status-a">connecting</span></div>
				<div class="screen" id="screen-a"></div>
			</div>
			<div class="pane">
				<div class="pane-head"><span>Client B</span><span class="status" id="status-b">connecting</span></div>
				<div class="screen" id="screen-b"></div>
			</div>
		</div>
		<script type="module" src="/app.js"></script>
	</body>
</html>
