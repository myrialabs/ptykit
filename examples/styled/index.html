<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>ptykit · styled</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.min.css" />
		<style>
			html, body { margin: 0; height: 100%; background: #0b1220; color: #e2e8f0; font-family: ui-monospace, monospace; }
			#bar { display: flex; align-items: center; gap: 10px; padding: 8px 12px; font-size: 12px; border-bottom: 1px solid #1e293b; }
			#presets { display: flex; gap: 6px; }
			#presets button {
				font: 12px ui-monospace, monospace; color: #cbd5e1; cursor: pointer;
				background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 4px 10px;
			}
			#presets button:hover { border-color: #475569; }
			#presets button.active { background: #22c55e; border-color: #22c55e; color: #052e16; font-weight: 600; }
			#status { margin-left: auto; text-transform: uppercase; opacity: 0.8; }
			#status[data-status='connected'] { color: #4ade80; }
			#status[data-status='reconnecting'] { color: #fde047; }
			#status[data-status='disconnected'] { color: #f87171; }
			#screen { position: absolute; top: 41px; left: 0; right: 0; bottom: 0; padding: 6px; }
		</style>
	</head>
	<body>
		<div id="bar">
			<strong>ptykit</strong> · styled
			<div id="presets"></div>
			<span id="status">connecting</span>
		</div>
		<div id="screen"></div>
		<script type="module" src="/app.js"></script>
	</body>
</html>
